# market-intel executor in Docker.
#
# Prerequisite: an MT5 terminal logged into a DEMO account + the bridge
# (executor/bridge_server.py) running OUTSIDE this container — natively on
# Windows, or under Wine on Linux/macOS (docs/INSTALL-WINE-MT5.md).
# Start that bridge with MI_BRIDGE_BIND=172.17.0.1 (docker0) so the container
# can reach it — do NOT use 0.0.0.0 unless you understand the exposure.
#
#   cp intel/.env.example intel/.env    # edit symbols/risk to taste
#   docker compose up -d
#   open http://127.0.0.1:8877
services:
  executor:
    build: .
    restart: unless-stopped
    env_file:
      - path: intel/.env
        required: false
    environment:
      MI_BRIDGE_SPAWN: "0"
      MI_BRIDGE_HOST: host.docker.internal
      MI_DASH_HOST: 0.0.0.0
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:8877:8877"
    volumes:
      # journal + memory survive container rebuilds
      - executor-data:/app/executor/data
      - executor-logs:/app/logs

volumes:
  executor-data:
  executor-logs:
